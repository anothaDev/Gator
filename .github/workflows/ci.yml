name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Build Go app
        run: go build ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  release-binary:
    name: Release Binary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Build embedded release binary
        run: go build -tags release -o gator .

      - name: Smoke test embedded binary
        run: |
          tmpdb=$(mktemp /tmp/gator-ci-XXXXXX.db)
          PORT=18080 DATABASE_PATH="$tmpdb" ./gator >/tmp/gator-ci.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT
          sleep 3
          curl -fsS http://127.0.0.1:18080/ >/dev/null
          curl -fsS http://127.0.0.1:18080/gator-logo.svg >/dev/null
          kill $pid
          wait $pid || true
