services:
  gator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/anothadev/gator:latest
    container_name: gator
    restart: unless-stopped
    environment:
      PORT: ${GATOR_PORT:-8080}
      DATABASE_PATH: /data/gator.db
      GATOR_URL: ${GATOR_URL:-}
    ports:
      - "${GATOR_PORT:-8080}:${GATOR_PORT:-8080}"
    volumes:
      - gator-data:/data

volumes:
  gator-data:
