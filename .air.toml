root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/gator ."
  bin = "./tmp/gator"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["frontend", "docs", "tmp", "node_modules"]
  delay = 200
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true

[misc]
  clean_on_exit = true
